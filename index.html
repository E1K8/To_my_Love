<!DOCTYPE html>
<style>
    body{
        display: flex;
        flex-direction: row;
        height: fit-content;
        flex-wrap: wrap; 
        background: #9b2a81;
background: linear-gradient(90deg, rgba(155, 42, 129, 1) 100%, rgba(199, 87, 134, 1) 100%, rgba(83, 93, 237, 1) 100%);
    }
    h1 {
        flex: 1;
        width: fit-content;
        height: fit-content;
        position: relative;
    }
    video{
        flex: 1;
        border: 15px solid pink;
        border-radius: 2%;
        width: fit-content;
        height: fit-content;
        position: relative;
        top: 40px;
        left: 25%;
    }
    img{
        border: 9px solid pink;
        border-radius: 2.5%;
        width: fit-content;
        height: fit-content;
    }
    footer {
        flex-basis: 100%;
        height: 300px;
        width: 400px;
    }
    body{
  padding:40vh 0;
  background-color:#fff
}

.heart {
  animation: heartbeat 1s infinite;
  background-color: red;
  display: inline-block;
  height: 50px;
  margin: 0 10px;
  position: relative;
  top:-15%;
  left: 40px;
  transform: rotate(-45deg);
  position: relative; 

  left: 45%; top: 45%;
  width: 50px;
}

.heart:before,
.heart:after {
  content: "";
  background-color: red;
  border-radius: 50%;
  height: 50px;
  position: absolute;
  width: 50px;
}

.heart:before {
  top: -25px;
  left: 0;
}

.heart:after {
  left: 25px;
  top: 0;
}

@keyframes heartbeat
{
  0%
  {
    transform: scale( 1 )
      rotate(-45deg);    
  }
  20%
  {
    transform: scale( 1.25 )
      rotate(-45deg);  
  }
   40%
  {
    transform: scale( 1.5 )
      rotate(-45deg);
  }
}
</style>
<title>Пазлики❤️</title>

<body>
    <div style = "left: 47vw;"class="heart"></div>
    <h1>
        <img src="kittens_one.jpg" 
             style="width: 70%;" >
    </h1>
    <h1 style="position: relative; left: 10%; ">
        <img src="kittens_two.jpg" 
             style="width: 70%;">
    </h1>
    <footer>
        <video style="position: relative;top:55%;" src="heart.mp4" controls></video>
    </footer>
</body>
